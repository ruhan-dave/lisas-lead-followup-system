name: Check Lead Responses

on:
  schedule:
    # Hourly
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-responses:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check responses
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_LEADS_TABLE: ${{ secrets.AIRTABLE_LEADS_TABLE }}
          AIRTABLE_MESSAGES_TABLE: ${{ secrets.AIRTABLE_MESSAGES_TABLE }}
          AIRTABLE_AGENT_ACTIONS_TABLE: ${{ secrets.AIRTABLE_AGENT_ACTIONS_TABLE }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          DRY_RUN: ${{ secrets.DRY_RUN }}
        run: |
          python main.py check
